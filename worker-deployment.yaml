apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: voting-app 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec: 
      containers:
         - name: worker 
           image: dockersamples/examplevotingapp_worker
           env:
             - name: REDIS_HOST
               value: redis
             - name: REDIS_PORT
               value: "6379"
           resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"    
